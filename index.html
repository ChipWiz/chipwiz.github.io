<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chipwiz</title>
  <meta name="description" content="Independent iOS developer. Contact page for app and development inquiries.">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f5f5f7;
      --panel: rgba(255, 255, 255, 0.72);
      --text: #1d1d1f;
      --muted: #6e6e73;
      --line: rgba(0, 0, 0, 0.08);
      --accent: #0071e3;
      --accent-hover: #005bb5;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --panel: rgba(28, 28, 30, 0.72);
        --text: #f5f5f7;
        --muted: #a1a1a6;
        --line: rgba(255, 255, 255, 0.10);
        --accent: #2997ff;
        --accent-hover: #52a9ff;
        --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }
    }

    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(0, 113, 227, 0.10), transparent 35%),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    .card {
      width: min(100%, 760px);
      padding: 56px 32px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .eyebrow {
      margin: 0 0 14px;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--muted);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
      font-weight: 700;
    }

    .subtitle {
      margin: 18px auto 0;
      max-width: 30ch;
      font-size: clamp(1.1rem, 2.3vw, 1.4rem);
      color: var(--muted);
    }

    .contact {
      margin-top: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px 22px;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
      box-shadow: 0 10px 30px rgba(0, 113, 227, 0.25);
    }

    .contact:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .contact:focus-visible {
      outline: 3px solid rgba(0, 113, 227, 0.30);
      outline-offset: 4px;
    }

    .note {
      margin: 28px auto 0;
      max-width: 42ch;
      font-size: 0.98rem;
      color: var(--muted);
    }

    footer {
      margin-top: 36px;
      font-size: 0.92rem;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .card {
        padding: 42px 22px;
        border-radius: 24px;
      }

      .contact {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">Independent iOS Developer</p>
    <h1>Chipwiz</h1>
    <p class="subtitle">Building simple, thoughtful apps for Apple platforms.</p>

    <a class="contact" href="mailto:youremail@example.com">Contact me</a>

    <p class="note">
      App currently in development. For product questions, collaboration, or early inquiries, please reach out by email.
    </p>

    <footer>
      © 2026 Chipwiz
    </footer>
  </main>
</body>
</html>
